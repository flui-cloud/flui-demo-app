# Local development stack — mirrors the three components in flui.yaml.
# `docker compose up --build` then open http://localhost:3000
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--requirepass", "demo"]
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--http_port", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  app:
    build: .
    environment:
      PORT: 3000
      DATABASE_URL: postgres://demo:demo@postgres:5432/demo
      REDIS_URL: redis://:demo@redis:6379
      NATS_URL: nats://nats:4222
      # Ambient traffic so the page is never static (POST /generator/stop to pause).
      GENERATOR_ENABLED: "true"
      GENERATOR_MIN_MS: "700"
      GENERATOR_MAX_MS: "1800"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started

volumes:
  pg_data:
